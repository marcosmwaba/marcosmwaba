<svg width="860" height="1270" viewBox="0 0 860 1270" xmlns="http://www.w3.org/2000/svg">
<defs>
  <pattern id="scan" width="860" height="4" patternUnits="userSpaceOnUse">
    <rect width="860" height="3" fill="none"/>
    <rect y="3" width="860" height="1" fill="black" fill-opacity="0.13"/>
  </pattern>
  <radialGradient id="vig" cx="50%" cy="50%" r="72%">
    <stop offset="50%" stop-color="black" stop-opacity="0"/>
    <stop offset="100%" stop-color="black" stop-opacity="0.65"/>
  </radialGradient>
  <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#8A0000"/>
    <stop offset="50%" stop-color="#FF1414"/>
    <stop offset="100%" stop-color="#8A0000"/>
  </linearGradient>
  <filter id="pglow" x="-15%" y="-15%" width="130%" height="130%">
    <feGaussianBlur stdDeviation="1.8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="aglow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="1.2" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <style>
    @keyframes flicker {
      0%,100%{opacity:1} 90%{opacity:1} 91%{opacity:.94} 92%{opacity:1} 97%{opacity:.97} 98%{opacity:1}
    }
    @keyframes cblink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    .term { animation: flicker 8s ease-in-out infinite; }
    .cur  { animation: cblink 1.1s step-end infinite; }
  </style>
</defs>
<!-- BG -->
<rect width="860" height="1270" fill="#04090A"/>
<g class="term">
<!-- ── TOP RED BAR ── -->
<rect width="860" height="36" fill="url(#barGrad)" filter="url(#aglow)"/>
<text x="12"  y="23" fill="#0A0000" font-family="'Courier New',monospace" font-size="11" font-weight="bold" letter-spacing="2">IBM SYSTEM/370 COBOL COMPILER V4.2</text>
</g>
</svg>
