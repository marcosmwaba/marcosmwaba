<svg width="860" height="1270" viewBox="0 0 860 1270" xmlns="http://www.w3.org/2000/svg">
<defs>
  <pattern id="scan" width="860" height="4" patternUnits="userSpaceOnUse">
    <rect width="860" height="3" fill="none"/>
    <rect y="3" width="860" height="1" fill="black" fill-opacity="0.18"/>
  </pattern>
  <radialGradient id="vig" cx="50%" cy="50%" r="72%">
    <stop offset="50%" stop-color="black" stop-opacity="0"/>
    <stop offset="100%" stop-color="black" stop-opacity="0.7"/>
  </radialGradient>
  <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#8A0000"/>
    <stop offset="50%" stop-color="#FF1414"/>
    <stop offset="100%" stop-color="#8A0000"/>
  </linearGradient>
  <filter id="pglow" x="-15%" y="-15%" width="130%" height="130%">
    <feGaussianBlur stdDeviation="1.8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="aglow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="1.4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="wglow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="2.2" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <style>
    @keyframes flicker {
      0%,100%{opacity:1} 90%{opacity:1} 91%{opacity:.93} 92%{opacity:1} 97%{opacity:.96} 98%{opacity:1}
    }
    @keyframes cblink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    .term { animation: flicker 8s ease-in-out infinite; }
    .cur  { animation: cblink 1.1s step-end infinite; }
  </style>
</defs>

<!-- BG -->
<rect width="860" height="1270" fill="#050505"/>

<g class="term">
  <!-- ── TOP RED BAR ── -->
  <rect width="860" height="36" fill="url(#barGrad)" filter="url(#aglow)"/>
  <text x="12" y="23" fill="#0A0000" font-family="'Courier New',monospace" font-size="11" font-weight="bold" letter-spacing="2">ANDROID SDK BUILD CONSOLE — GRADLE 8.7 / JDK 17</text>
  <circle cx="820" cy="18" r="6" fill="#FFFFFF" filter="url(#wglow)"/>
  <circle cx="800" cy="18" r="6" fill="#0A0000"/>

  <!-- TERMINAL BODY -->
  <rect x="0" y="36" width="860" height="1234" fill="#070707"/>

  <g font-family="'Courier New',monospace" font-size="15" fill="#FF3B3B" filter="url(#pglow)">
    <text x="18" y="70">$ ./gradlew assembleDebug</text>
    <text x="18" y="98" fill="#B71C1C">&gt; Task :app:preBuild UP-TO-DATE</text>
    <text x="18" y="122" fill="#B71C1C">&gt; Task :app:preDebugBuild UP-TO-DATE</text>
    <text x="18" y="146" fill="#B71C1C">&gt; Task :app:compileDebugKotlin</text>
    <text x="18" y="170" fill="#B71C1C">&gt; Task :app:mergeDebugResources</text>
    <text x="18" y="194" fill="#B71C1C">&gt; Task :app:processDebugManifest</text>
    <text x="18" y="218" fill="#B71C1C">&gt; Task :app:packageDebug</text>

    <text x="18" y="256" fill="#FFFFFF" filter="url(#wglow)" font-weight="bold">BUILD SUCCESSFUL in 42s</text>
    <text x="18" y="280" fill="#FF3B3B">37 actionable tasks: 6 executed, 31 up-to-date</text>

    <text x="18" y="318">$ adb install -r app/build/outputs/apk/debug/app-debug.apk</text>
    <text x="18" y="342" fill="#B71C1C">Performing Streamed Install</text>
    <text x="18" y="366" fill="#FFFFFF" filter="url(#wglow)">Success</text>

    <text x="18" y="404">$ adb logcat -s MainActivity:D AndroidRuntime:E</text>
    <text x="18" y="428" fill="#B71C1C">--------- beginning of main</text>
    <text x="18" y="452" fill="#B71C1C">D/MainActivity: onCreate() called</text>
    <text x="18" y="476" fill="#B71C1C">D/MainActivity: fetching remote config...</text>
    <text x="18" y="500" fill="#B71C1C">D/MainActivity: recyclerview bound, 24 items</text>

    <text x="18" y="538" fill="#FF0000" filter="url(#wglow)" font-weight="bold">E/AndroidRuntime: FATAL EXCEPTION: main</text>
    <text x="18" y="562" fill="#FF3B3B">    Process: com.example.demo, PID: 4821</text>
    <text x="18" y="586" fill="#FF3B3B">    java.lang.NullPointerException:</text>
    <text x="18" y="610" fill="#FF3B3B">    Attempt to invoke virtual method on a null</text>
    <text x="18" y="634" fill="#FF3B3B">    object reference</text>
    <text x="18" y="662" fill="#B71C1C">        at com.example.demo.MainActivity.onCreate</text>
    <text x="18" y="686" fill="#B71C1C">        (MainActivity.kt:42)</text>
    <text x="18" y="710" fill="#B71C1C">        at android.app.Activity.performCreate</text>
    <text x="18" y="734" fill="#B71C1C">        (Activity.java:8000)</text>

    <text x="18" y="772">$ git add . &amp;&amp; git commit -m "fix: null check on config"</text>
    <text x="18" y="796" fill="#B71C1C">[main a1f9c02] fix: null check on config</text>
    <text x="18" y="820" fill="#B71C1C">1 file changed, 6 insertions(+), 1 deletion(-)</text>

    <text x="18" y="858">$ ./gradlew assembleDebug</text>
    <text x="18" y="882" fill="#FFFFFF" filter="url(#wglow)" font-weight="bold">BUILD SUCCESSFUL in 11s</text>

    <text x="18" y="920">$ adb shell am start -n com.example.demo/.MainActivity</text>
    <text x="18" y="944" fill="#B71C1C">Starting: Intent { cmp=com.example.demo/.MainActivity }</text>
    <text x="18" y="968" fill="#FFFFFF" filter="url(#wglow)">Activity launched — no crash detected</text>

    <text x="18" y="1010">$ <tspan class="cur">█</tspan></text>
  </g>

  <!-- scanlines overlay -->
  <rect x="0" y="36" width="860" height="1234" fill="url(#scan)"/>
</g>

<!-- vignette -->
<rect width="860" height="1270" fill="url(#vig)"/>
</svg>
